spring.application.name=APIGATEWAY
server.port=8086

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

management.endpoints.web.exposure.include=*


spring.cloud.gateway.server.webmvc.routes[0].id=InventoryService
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://InventoryService
spring.cloud.gateway.server.webmvc.routes[0].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[0].predicates[0].args.pattern=/inventory-api/**

spring.cloud.gateway.server.webmvc.routes[1].id=OrderService
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://OrderService
spring.cloud.gateway.server.webmvc.routes[1].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[1].predicates[0].args.pattern=/order-api/**

spring.cloud.gateway.server.webmvc.routes[2].id=PaymentService
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://PaymentService
spring.cloud.gateway.server.webmvc.routes[2].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[2].predicates[0].args.pattern=/payment-api/**

spring.cloud.gateway.server.webmvc.routes[3].id=EmailService
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://EmailService
spring.cloud.gateway.server.webmvc.routes[3].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[3].predicates[0].args.pattern=/email-api/**