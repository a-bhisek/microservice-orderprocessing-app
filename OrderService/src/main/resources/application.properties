spring.application.name=OrderService
server.port=8082

#Import Config Server
spring.config.import=optional:configserver:

#Connect To Admin Server as Admin client 
spring.boot.admin.client.url=http://localhost:8085
#Activate All The Actuators
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.post.enabled=true
management.endpoint.env.show-values=always
management.endpoint.shutdown.access=UNRESTRICTED

#logging file name
logging.file.name= E:/SpringBoot And Microservices Naresh It/Projects By Me/MicroserviceOrderProcesingApp/order_elk_log.txt
#Specify logger level as debug for com.spring (root) package
logging.level.com.spring=debug